# ============================================================================
# Validation feature PREPROCESS config.
#
# This config drives the validation feature extraction branch of
# ``train_flashtalk_stage1.py`` (i.e. mode=preprocess + preprocess_split=val).
# It walks ``val_annotation_file`` and writes per-sample features into
# ``<val_features_dir>/<sample_id>/`` (context.pt, full_emb.pt, clip_fea.pt,
# first_frame_latent.pt, cond_latents.pt, metadata.json) plus a single shared
# ``context_null.pt`` directly inside ``val_features_dir/`` (for CFG at val).
#
# IMPORTANT: regardless of whether you plan to evaluate Stage 1 or Stage 2
# checkpoints, val features MUST be produced via ``train_flashtalk_stage1.py``
# (this config). Stage 1 and Stage 2 validation share the same feature layout.
#
# Defaults below target the bundled 12-clip demo set
# (processed_data/example/val_data.csv) so the script works out-of-the-box on
# a fresh checkout. For your real dataset:
#   1) Point ``val_annotation_file`` at your CSV (columns: video, input_audio, prompt).
#   2) Point ``val_features_dir`` at the desired output directory. Note that
#      ``config/train_stage1.yaml`` and ``config/train_stage2.yaml`` default
#      to ``processed_data/talkcuts/val/feature`` — keep them in sync.
#   3) If your CSV uses paths relative to a dataset root, set ``dataset_dir``
#      accordingly. Empty string means "resolve relative to project root".
# ============================================================================

# ===== Mode =====
mode: preprocess
preprocess_split: val

# ===== Dataset =====
# dataset_dir is ONLY used as the base directory for resolving relative paths
# inside the CSV (val_annotation_file) and generating relative sample_ids.
# It DOES NOT affect the output path val_features_dir or output_dir.
# Empty dataset_dir means CSV paths are resolved relative to the project root.
dataset_dir: ""
val_annotation_file: processed_data/example/val_data.csv

# ===== Output =====
val_features_dir: processed_data/example/val/feature # output feature
output_dir: outputs/flashtalk_val_preprocess_example # output log